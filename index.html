<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✝️ 랜덤 말씀-구글 시트 연동</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --title-size: 20px;
            --text-size: 14px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            background-color: transparent; /* 노션 배경에 맞춤 */
        }

        /* 350px 정사각형 위젯 본체 */
        #widget-container {
            width: 350px; height: 350px;
            position: relative; overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background-color: #222; /* 이미지가 없을 때 기본 배경색 */
        }

        /* 배경 이미지 */
        #bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: opacity 0.8s ease-in-out; opacity: 0;
            z-index: 1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); z-index: 2;
        }

        /* 중앙 컨텐츠 */
        #content-area {
            position: absolute; inset: 0; z-index: 3;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; color: white;
            padding: 40px 25px; transition: opacity 0.5s; opacity: 0;
        }

        .font-sans { font-family: 'Noto Sans KR', sans-serif; }
        .font-serif { font-family: 'Nanum Myeongjo', serif; }

        #verse {
            font-size: var(--title-size); line-height: 1.6;
            margin-bottom: 15px; font-weight: 700; word-break: keep-all;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        #ref {
            font-size: var(--text-size); opacity: 0.8;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* 우측 상단 컨트롤 버튼 */
        .controls {
            position: absolute; top: 15px; right: 15px;
            display: flex; gap: 8px; z-index: 10;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3);
            color: white; width: 36px; height: 36px; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.4); }

        /* 회전 애니메이션 */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: spin 0.8s linear infinite; }

        /* 내부 설정 패널 */
        #settings-panel {
            position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.92); /* 흰색 반투명 */
            z-index: 100; display: none;
            padding: 30px; box-sizing: border-box;
            flex-direction: column; justify-content: center;
            font-family: sans-serif; border-radius: 20px;
        }

        .setting-item { margin-bottom: 20px; }
        .setting-item label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 8px; color: #555; }
        .setting-item input[type="range"] { width: 100%; cursor: pointer; }
        
        .tab-group { display: flex; background: #ddd; border-radius: 8px; padding: 3px; }
        .tab-group button { 
            flex: 1; border: none; background: none; padding: 6px; 
            font-size: 11px; cursor: pointer; border-radius: 6px; transition: 0.2s;
        }
        .tab-group button.active { background: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="widget-container">
        <div id="bg-image"></div>
        <div class="overlay"></div>

        <div class="controls">
            <div class="icon-btn" onclick="startShuffle()">
                <i id="refresh-icon" data-lucide="refresh-cw" style="width:18px;"></i>
            </div>
            <div class="icon-btn" onclick="toggleSettings()">
                <i data-lucide="settings" style="width:18px;"></i>
            </div>
        </div>

        <div id="content-area" class="font-serif">
            <div id="verse">데이터 로드 중...</div>
            <div id="ref"></div>
        </div>

        <div id="settings-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h3 style="margin:0; font-size:16px; color:#333;">위젯 설정</h3>
                <div style="cursor:pointer;" onclick="toggleSettings()"><i data-lucide="x" style="width:20px; color:#999;"></i></div>
            </div>
            
            <div class="setting-item">
                <label>폰트 스타일</label>
                <div class="tab-group">
                    <button id="btn-sans" onclick="updateFont('sans')">고딕</button>
                    <button id="btn-serif" class="active" onclick="updateFont('serif')">명조</button>
                </div>
            </div>

            <div class="setting-item">
                <label>제목 크기 (<span id="title-val">20</span>px)</label>
                <input type="range" id="input-title" min="14" max="32" value="20" oninput="updateSize('title', this.value)">
            </div>

            <div class="setting-item">
                <label>본문 크기 (<span id="text-val">14</span>px)</label>
                <input type="range" id="input-text" min="10" max="22" value="14" oninput="updateSize('text', this.value)">
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // 🚨 여기에 구글 시트에서 복사한 CSV 주소를 쌍따옴표 안에 넣어주세요!
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWcjiSLo2bgJaxdG_HThaONrmJJ2TFPq8ucwvAWtwRi-7no7hVk5FNqeg7fqkaU82Uoi7t7XzOXW6q/pub?gid=0&single=true&output=csv";

        let bibleData = [];
        let config = { font: 'serif', titleSize: 20, textSize: 14 };

        async function loadSheetData() {
            try {
                // 주소에 이미 물음표가 있는지 확인하여 자동으로 처리
                const urlConnector = SHEET_CSV_URL.includes('?') ? '&' : '?';
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                
                // CSV 파싱 (엑셀 데이터 읽기)
                const rows = data.split('\n').map(r => r.trim()).filter(r => r); // 빈 줄 제거
                
                // 첫 줄(헤더) 제외하고 데이터 가공
                bibleData = rows.slice(1).map(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        text: columns[0] ? columns[0].replace(/^"|"$/g, '').trim() : '',
                        ref: columns[1] ? columns[1].replace(/^"|"$/g, '').trim() : '',
                        image: columns[2] ? columns[2].replace(/^"|"$/g, '').trim() : ''
                    };
                }).filter(item => item.text); // 말씀 텍스트가 없는 항목은 제외

                if (bibleData.length === 0) {
                    document.getElementById('verse').innerText = "시트에 작성된 데이터가 없습니다.";
                    return;
                }

                loadConfig(); // 저장된 글씨 크기 등 불러오기
                applyFinal(); // 화면에 표시
            } catch (e) {
                console.error("데이터 로드 오류:", e);
                document.getElementById('verse').innerText = "시트 연결 실패! 링크를 다시 확인해주세요.";
            }
        }

        let isShuffling = false;

        function startShuffle() {
            if (isShuffling || bibleData.length === 0) return;
            isShuffling = true;
            
            const icon = document.getElementById('refresh-icon');
            const content = document.getElementById('content-area');
            const bg = document.getElementById('bg-image');
            
            icon.classList.add('rotating');
            content.style.opacity = 0;
            bg.style.opacity = 0;

            setTimeout(() => {
                let count = 0;
                const shuffleInterval = setInterval(() => {
                    const temp = bibleData[Math.floor(Math.random() * bibleData.length)];
                    document.getElementById('verse').innerText = `"${temp.text}"`;
                    document.getElementById('ref').innerText = temp.ref;
                    count++;
                    if (count > 8) {
                        clearInterval(shuffleInterval);
                        applyFinal();
                    }
                }, 60);
            }, 500);
        }

        function applyFinal() {
            if (bibleData.length === 0) return;
            const selected = bibleData[Math.floor(Math.random() * bibleData.length)];
            const bg = document.getElementById('bg-image');
            const content = document.getElementById('content-area');
            const icon = document.getElementById('refresh-icon');

            if (selected.image) {
                bg.style.backgroundImage = `url('${selected.image}')`;
            } else {
                bg.style.backgroundImage = 'none';
            }
            
            document.getElementById('verse').innerText = `"${selected.text}"`;
            document.getElementById('ref').innerText = selected.ref;

            setTimeout(() => {
                bg.style.opacity = 1;
                content.style.opacity = 1;
                icon.classList.remove('rotating');
                isShuffling = false;
            }, 100);
        }

        function saveConfig() { localStorage.setItem('widget-config', JSON.stringify(config)); }
        
        function loadConfig() {
            const saved = localStorage.getItem('widget-config');
            if (saved) {
                config = JSON.parse(saved);
                updateFont(config.font, false);
                updateSize('title', config.titleSize, false);
                updateSize('text', config.textSize, false);
                document.getElementById('input-title').value = config.titleSize;
                document.getElementById('input-text').value = config.textSize;
            }
        }
        
        function toggleSettings() { 
            const p = document.getElementById('settings-panel'); 
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex'; 
        }
        
        function updateFont(t, s=true) {
            config.font = t;
            document.getElementById('content-area').className = (t === 'serif') ? 'font-serif' : 'font-sans';
            document.getElementById('btn-serif').className = (t === 'serif') ? 'active' : '';
            document.getElementById('btn-sans').className = (t === 'sans') ? 'active' : '';
            if(s) saveConfig();
        }
        
        function updateSize(t, v, s=true) {
            if(t === 'title') config.titleSize = v; else config.textSize = v;
            document.documentElement.style.setProperty(`--${t}-size`, v + 'px');
            document.getElementById(`${t}-val`).innerText = v;
            if(s) saveConfig();
        }

        // 페이지가 열리면 가장 먼저 실행
        window.onload = loadSheetData;
    </script>
</body>
</html>
