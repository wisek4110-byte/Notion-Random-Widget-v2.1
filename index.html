<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말씀 랜덤 위젯 V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --title-size: 24px;
            --text-size: 16px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #000;
        }

        /* 배경 이미지 설정 (부드러운 전환) */
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1;
            transition: opacity 0.8s ease-in-out;
            opacity: 0;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        /* 중앙 컨텐츠 */
        .container {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center; color: white;
            padding: 0 20px;
            transition: opacity 0.6s ease-in-out;
            opacity: 0; /* 처음엔 투명 */
        }

        .font-sans { font-family: 'Noto Sans KR', sans-serif; }
        .font-serif { font-family: 'Nanum Myeongjo', serif; }

        .verse-box {
            max-width: 600px; text-shadow: 0 2px 15px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        #verse {
            font-size: var(--title-size);
            line-height: 1.6; margin-bottom: 20px;
            word-break: keep-all; font-weight: 700;
            transition: transform 0.3s ease;
        }

        #ref {
            font-size: var(--text-size);
            opacity: 0.8;
        }

        /* 하단 컨트롤 바 */
        .controls {
            position: fixed; bottom: 30px; display: flex; gap: 15px; z-index: 10;
        }
        
        .btn-main {
            background: rgba(255, 255, 255, 0.15);
            color: white; border: 1px solid rgba(255,255,255,0.4);
            padding: 12px 28px; border-radius: 30px; cursor: pointer;
            backdrop-filter: blur(8px); transition: 0.3s; font-size: 1rem;
            font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-main:hover { background: white; color: black; transform: translateY(-2px); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 설정 패널 */
        #settings-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98); color: #222;
            padding: 30px; border-radius: 20px; z-index: 100;
            display: none; width: 300px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            font-family: sans-serif;
        }
        .setting-item { margin-bottom: 25px; }
        .setting-item label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 10px; color: #555; }
        .setting-item input[type="range"] { width: 100%; cursor: pointer; }
        
        .tab-group { display: flex; background: #eee; border-radius: 10px; padding: 4px; }
        .tab-group button { 
            flex: 1; border: none; background: none; padding: 8px; 
            font-size: 13px; cursor: pointer; border-radius: 7px; transition: 0.2s;
        }
        .tab-group button.active { background: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 셔플 효과를 위한 애니메이션 */
        .shuffling { transform: scale(0.95); opacity: 0.5 !important; }
    </style>
</head>
<body class="font-serif">

    <div id="bg-image"></div>
    <div class="overlay"></div>

    <div id="main-container" class="container">
        <div class="verse-box">
            <div id="verse">로딩 중...</div>
            <div id="ref"></div>
        </div>
    </div>

    <div class="controls">
        <button id="draw-btn" class="btn-main" onclick="startShuffle()">말씀 뽑기</button>
        <button class="btn-main" onclick="toggleSettings()">설정</button>
    </div>

    <div id="settings-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h3 style="margin:0; font-size:18px;">위젯 커스텀</h3>
            <span style="cursor:pointer; font-size:24px; color:#aaa;" onclick="toggleSettings()">&times;</span>
        </div>
        
        <div class="setting-item">
            <label>폰트 스타일</label>
            <div class="tab-group">
                <button id="btn-sans" onclick="setFont('sans')">고딕</button>
                <button id="btn-serif" class="active" onclick="setFont('serif')">명조</button>
            </div>
        </div>

        <div class="setting-item">
            <label>제목 크기 (<span id="title-val">24</span>px)</label>
            <input type="range" min="16" max="45" value="24" oninput="updateSize('title', this.value)">
        </div>

        <div class="setting-item">
            <label>본문 크기 (<span id="text-val">16</span>px)</label>
            <input type="range" min="12" max="28" value="16" oninput="updateSize('text', this.value)">
        </div>
    </div>

    <script>
        const bibleData = [
            { 
                text: "여호와는 나의 목자시니 내게 부족함이 없으리로다", 
                ref: "시편 23편 1절",
                image: "https://images.unsplash.com/photo-1564314020584-493ec1b9fdb6?q=80&w=1200&auto=format&fit=crop"
            },
            { 
                text: "두려워하지 말라 내가 너와 함께 함이라 놀라지 말라 나는 네 하나님이 됨이라 내가 너를 굳세게 하리라 참으로 너를 도와 주리라 참으로 나의 의로운 오른손으로 너를 붙들리라", 
                ref: "이사야 41장 10절",
                image: "https://images.unsplash.com/photo-1535615615570-3b839f4359be?q=80&w=1200&auto=format&fit=crop"
            },
            { 
                text: "너의 하나님 여호와가 너의 가운데에 계시니 그는 구원을 베푸실 전능자이시라 그가 너로 말미암아 기쁨을 이기지 못하시며 너를 잠잠히 사랑하시며 너로 말미암아 즐거이 부르며 기뻐하시리라 하리라", 
                ref: "스바냐 3장 17절",
                image: "https://images.unsplash.com/photo-1558979142-19e920d27587?q=80&w=1200&auto=format&fit=crop"
            },
            { 
                text: "사랑하는 자여 네 영혼이 잘됨 같이 네가 범사에 잘되고 강건하기를 내가 간구하노라", 
                ref: "요한삼서 1장 2절",
                image: "https://images.unsplash.com/photo-1544911845-1f34a3eb46b1?q=80&w=1200&auto=format&fit=crop"
            }
        ];

        let isShuffling = false;

        // 셔플 애니메이션 시작
        function startShuffle() {
            if (isShuffling) return;
            isShuffling = true;
            
            const btn = document.getElementById('draw-btn');
            const container = document.getElementById('main-container');
            const bg = document.getElementById('bg-image');
            
            btn.disabled = true;
            btn.innerText = "말씀 찾는 중...";
            
            // 1. 서서히 어두워지기 (요청하신 일괄 페이드 효과 시작)
            container.style.opacity = 0;
            bg.style.opacity = 0;

            setTimeout(() => {
                let count = 0;
                // 셔플 효과 (빠르게 텍스트만 바꿈)
                const shuffleInterval = setInterval(() => {
                    const tempItem = bibleData[Math.floor(Math.random() * bibleData.length)];
                    document.getElementById('verse').innerText = `"${tempItem.text}"`;
                    document.getElementById('ref').innerText = tempItem.ref;
                    count++;

                    if (count > 10) {
                        clearInterval(shuffleInterval);
                        applyFinalItem();
                    }
                }, 50);
            }, 600);
        }

        // 최종 결과 적용 및 페이드 인
        function applyFinalItem() {
            const selected = bibleData[Math.floor(Math.random() * bibleData.length)];
            const container = document.getElementById('main-container');
            const bg = document.getElementById('bg-image');
            const btn = document.getElementById('draw-btn');

            bg.style.backgroundImage = `url('${selected.image}')`;
            document.getElementById('verse').innerText = `"${selected.text}"`;
            document.getElementById('ref').innerText = selected.ref;

            // 2. 서서히 밝아지기 (요청하신 일괄 페이드 효과)
            setTimeout(() => {
                container.style.opacity = 1;
                bg.style.opacity = 1;
                btn.disabled = false;
                btn.innerText = "말씀 뽑기";
                isShuffling = false;
            }, 100);
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function setFont(type) {
            const body = document.body;
            body.className = (type === 'serif') ? 'font-serif' : 'font-sans';
            document.getElementById('btn-serif').className = (type === 'serif') ? 'active' : '';
            document.getElementById('btn-sans').className = (type === 'sans') ? 'active' : '';
        }

        function updateSize(type, val) {
            document.documentElement.style.setProperty(`--${type}-size`, val + 'px');
            document.getElementById(`${type}-val`).innerText = val;
        }

        // 첫 시작 시 바로 하나 띄우기
        window.onload = applyFinalItem;
    </script>
</body>
</html>
